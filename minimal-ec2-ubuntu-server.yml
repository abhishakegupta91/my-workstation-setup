---
- name: Minimal EC2 Ubuntu Dev Setup
  hosts: localhost
  connection: local
  become: yes

  vars:
    username: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"

  tasks:
    - name: 1. Update APT package cache
      ansible.builtin.apt:
        update_cache: yes

    - name: 2. Install git, vim, and nginx
      ansible.builtin.apt:
        name:
          - git
          - vim
          - nginx
        state: present

    - name: 3a. Download NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /tmp/nodesource.gpg.key
        mode: '0644'

    - name: 3b. Add NodeSource GPG key to keyring
      ansible.builtin.shell:
        cmd: gpg --dearmor -o /usr/share/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
        creates: /usr/share/keyrings/nodesource.gpg

    - name: 3c. Add NodeSource apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_18.x nodistro main"
        state: present
        filename: nodesource

    - name: 3d. Install Node.js and npm
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: 4. Install Docker and docker-compose-plugin
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: 5. Install PostgreSQL client tools (psql)
      ansible.builtin.apt:
        name:
          - postgresql-client-common
          - postgresql-client
        state: present
        update_cache: yes

    - name: 6. Add user to docker group
      ansible.builtin.user:
        name: "{{ username }}"
        groups: docker
        append: yes

    - name: 7. Ensure .ssh directory exists
      ansible.builtin.file:
        path: "/home/{{ username }}/.ssh"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: '0700'

    - name: 8. Generate Ed25519 SSH key if not present
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -C "ec2-instance-{{ inventory_hostname }}" -f "/home/{{ username }}/.ssh/id_ed25519" -N ""
        creates: "/home/{{ username }}/.ssh/id_ed25519"
      become_user: "{{ username }}"

    - name: 9. Show public key (copy this to GitHub)
      ansible.builtin.command:
        cmd: cat "/home/{{ username }}/.ssh/id_ed25519.pub"
      register: ssh_pub_key

    - name: 10. Display SSH public key
      ansible.builtin.debug:
        msg: |
          Add this SSH public key to GitHub:
          {{ ssh_pub_key.stdout }}
